<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossa História 💝</title>
  <meta name="description" content="Uma viagem pelos nossos momentos mais marcantes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&family=Great+Vibes&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>" />
</head>
<body>
  <!-- Barra de progresso da leitura -->
  <div class="progresso" aria-hidden="true"><div class="progresso-barra" id="progressoBarra"></div></div>

  <!-- Capa -->
  <header class="hero">
    <div class="hero-fundo" aria-hidden="true"></div>
    <div class="hero-conteudo">
      <p class="hero-sub fade-item">Nossa história</p>
      <h1 class="hero-titulo fade-item" id="heroNomes">Gustavo <span class="amp">&amp;</span> Juliana</h1>
      <p class="hero-frase fade-item">Role devagar. Cada momento merece ser revivido.</p>
    </div>
    <div class="seta-scroll" aria-hidden="true">
      <span></span>
    </div>
  </header>

  <!-- Os momentos são gerados pelo script a partir de momentos.js -->
  <main id="linhaDoTempo"></main>

  <!-- Final -->
  <section class="final">
    <div class="coracoes" id="coracoes" aria-hidden="true"></div>
    <div class="final-conteudo">
      <h2 class="final-titulo fade-item" id="finalTitulo">Feliz Dia dos Namorados</h2>
      <p class="final-texto fade-item" id="finalTexto"></p>
      <div class="contador fade-item" id="contador"></div>
      <p class="assinatura fade-item" id="assinatura"></p>
    </div>
  </section>

  <script src="momentos.js"></script>
  <script src="script.js"></script>
</body>
</html>
